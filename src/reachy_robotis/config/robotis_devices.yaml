{
  "devices": {
    "reachy": {
      "enabled": true,
      "mode": "conversation"
    },
    "omx": {
      "display_name": "OMX",
      "enabled": true,
      "mode": "ssh_docker",
      "connection_id": "omx_pc",
      "bridge_host": "192.168.60.74",
      "bridge_port": 18001,
      "bridge_timeout_s": 2.0,
      "bridge_url": "http://192.168.60.74:18001",
      "cli_mode": "ssh_docker",
      "host": "192.168.60.74",
      "user": "robotis",
      "container_name": "open_manipulator",
      "ros_setup_paths": [
        "/opt/ros/jazzy/setup.bash",
        "/root/ros2_ws/install/setup.bash"
      ],
      "working_directory": "/root/ros2_ws",
      "dry_run": false,
      "commands": {
        "bringup_ai": {
          "display_name": "OMX-AI Leader Follower Bringup",
          "command_type": "container",
          "command": "ros2 launch open_manipulator_bringup omx_ai.launch.py",
          "run_mode": "detached"
        },
        "bringup_f": {
          "display_name": "OMX-F Bringup",
          "command_type": "container",
          "command": "ros2 launch open_manipulator_bringup omx_f.launch.py",
          "run_mode": "detached"
        },
        "moveit": {
          "display_name": "OMX MoveIt 2",
          "command_type": "container",
          "command": "ros2 launch open_manipulator_moveit_config omx_f_moveit.launch.py",
          "run_mode": "detached"
        },
        "gui": {
          "display_name": "OMX GUI",
          "command_type": "container",
          "command": "ros2 launch open_manipulator_gui omx_f_gui.launch.py",
          "run_mode": "detached"
        },
        "keyboard_teleop": {
          "display_name": "OMX Keyboard Teleop",
          "command_type": "container",
          "command": "ros2 run open_manipulator_teleop omx_f_teleop",
          "run_mode": "detached"
        },
        "play_demo_bag": {
          "display_name": "Play OMX Demo Rosbag",
          "command_type": "container",
          "command": "ros2 bag play /workspace/bags/omx_demo_motion",
          "run_mode": "detached"
        },
        "status_topics": {
          "display_name": "OMX ROS Topic List",
          "command_type": "container",
          "command": "ros2 topic list | head -80",
          "run_mode": "foreground"
        },
        "status_nodes": {
          "display_name": "OMX ROS Node List",
          "command_type": "container",
          "command": "ros2 node list | head -80",
          "run_mode": "foreground"
        },
        "stop": {
          "display_name": "Stop OMX ROS Processes",
          "command_type": "container",
          "command": "pkill -TERM -f 'open_manipulator|omx_|omx_f|omx_ai|ros2 launch|ros2 bag play' || true",
          "run_mode": "foreground"
        },
        "kill": {
          "display_name": "Kill OMX ROS Processes",
          "command_type": "container",
          "command": "pkill -KILL -f 'open_manipulator|omx_|omx_f|omx_ai|ros2 launch|ros2 bag play' || true",
          "run_mode": "foreground"
        }
      },
      "stable_preset": {
        "republish_rate": 5,
        "time_from_start": 0.08,
        "settle_margin": 0.30
      }
    },
    "omy": {
      "enabled": true,
      "platform": "raspberry_pi",
      "mode": "ssh_docker",
      "connection_id": "omy_raspberry_pi",
      "host": "192.168.50.56",
      "user": "pollen",
      "container_name": "omy_ros2",
      "ros_setup_path": "/opt/ros/humble/setup.bash",
      "dry_run": true,
      "commands": {
        "bringup": {
          "display_name": "OMY Bringup",
          "command_type": "container",
          "command": "ros2 launch open_manipulator_bringup omy_ai.launch.py",
          "run_mode": "detached"
        },
        "leader_follower": {
          "display_name": "OMY Leader Follower",
          "command_type": "container",
          "command": "ros2 launch open_manipulator_bringup omy_leader_follower.launch.py",
          "run_mode": "detached"
        },
        "play_demo_bag": {
          "display_name": "Play OMY Demo Rosbag",
          "command_type": "container",
          "command": "ros2 bag play /home/pollen/bags/omy_demo_wave",
          "run_mode": "detached"
        },
        "status_topics": {
          "display_name": "ROS Topic List",
          "command_type": "container",
          "command": "ros2 topic list | head -80",
          "run_mode": "foreground"
        },
        "stop": {
          "display_name": "Stop OMY Processes",
          "command_type": "container",
          "command": "pkill -TERM -f 'open_manipulator|ros2 launch|ros2 bag play' || true",
          "run_mode": "foreground"
        }
      }
    },
    "ai_worker": {
      "enabled": true,
      "platform": "jetson_orin_32gb",
      "mode": "ssh_docker",
      "connection_id": "ai_worker_jetson",
      "host": "192.168.50.57",
      "user": "robotis",
      "container_name": "ai_worker_ros2",
      "ros_setup_path": "/opt/ros/humble/setup.bash",
      "dry_run": true,
      "commands": {
        "container_start": {
          "display_name": "Start AI Worker Container",
          "command_type": "host",
          "command": "./docker/container.sh start",
          "run_mode": "foreground"
        },
        "bringup": {
          "display_name": "AI Worker Bringup",
          "command_type": "container",
          "command": "ros2 launch ffw_bringup ffw_bg2_ai.launch.py",
          "run_mode": "detached"
        },
        "bringup_bg2": {
          "display_name": "AI Worker BG2 Bringup",
          "command_type": "container",
          "command": "ros2 launch ffw_bringup ffw_bg2_ai.launch.py",
          "run_mode": "detached"
        },
        "teleop": {
          "display_name": "AI Worker Teleop",
          "command_type": "container",
          "command": "ros2 launch ffw_teleop teleop.launch.py",
          "run_mode": "detached"
        },
        "play_demo_bag": {
          "display_name": "Play AI Worker Demo Rosbag",
          "command_type": "container",
          "command": "ros2 bag play /workspace/bags/ai_worker_demo_motion",
          "run_mode": "detached"
        },
        "status_topics": {
          "display_name": "ROS Topic List",
          "command_type": "container",
          "command": "ros2 topic list | head -80",
          "run_mode": "foreground"
        },
        "stop": {
          "display_name": "Stop AI Worker Processes",
          "command_type": "container",
          "command": "pkill -TERM -f 'ffw_|ffw_bringup|ros2 launch|ros2 bag play' || true",
          "run_mode": "foreground"
        }
      }
    },
    "mock": {
      "enabled": true,
      "mode": "mock"
    }
  }
}
