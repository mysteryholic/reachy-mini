{
  "devices": {
    "omy": {
      "enabled": true,
      "platform": "raspberry_pi",
      "mode": "ssh_docker",
      "connection_id": "omy_raspberry_pi",
      "host": "192.168.50.56",
      "user": "pollen",
      "container_name": "omy_ros2",
      "docker_user": "",
      "ros_setup_path": "/opt/ros/humble/setup.bash",
      "working_directory": "/workspace",
      "dry_run": true,
      "commands": {
        "bringup": {
          "display_name": "OMY Bringup",
          "command_type": "container",
          "command": "ros2 launch open_manipulator_bringup omy_ai.launch.py",
          "run_mode": "detached"
        },
        "leader_follower": {
          "display_name": "OMY Leader Follower",
          "command_type": "container",
          "command": "ros2 launch open_manipulator_bringup omy_leader_follower.launch.py",
          "run_mode": "detached"
        },
        "play_demo_bag": {
          "display_name": "Play OMY Demo Rosbag",
          "command_type": "container",
          "command": "ros2 bag play /home/pollen/bags/omy_demo_wave",
          "run_mode": "detached"
        },
        "status_topics": {
          "display_name": "ROS Topic List",
          "command_type": "container",
          "command": "ros2 topic list | head -80",
          "run_mode": "foreground"
        },
        "stop": {
          "display_name": "Stop OMY Processes",
          "command_type": "container",
          "command": "pkill -TERM -f 'open_manipulator|ros2 launch|ros2 bag play' || true",
          "run_mode": "foreground"
        }
      }
    }
  }
}
