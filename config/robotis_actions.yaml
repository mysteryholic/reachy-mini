# Registered actions. Voice/chat/UI select an action by name; the IntentResolver
# maps a trigger phrase to one of these. Each action runs an allowlisted
# command_key (cli_command/stop), a saved manual task, or a teleop mode.
# Triggers are plain English text for this template.
actions:
  - name: ai_worker_bringup
    display_name: "AI Worker Bringup"
    kind: "recipe"
    device: "ai_worker"
    triggers:
      - "start AI Worker"
      - "AI Worker bringup"
      - "bring up AI Worker"
    run:
      method: "start_recipe"
      recipe_id: "ai_worker_bringup"

  - name: ai_worker_demo_command
    display_name: "AI Worker Demo Command"
    kind: "recipe"
    device: "ai_worker"
    triggers:
      - "play AI Worker demo"
      - "AI Worker demo"
      - "make AI Worker move"
    run:
      method: "start_recipe"
      recipe_id: "ai_worker_demo_command"

  - name: ai_worker_stop
    display_name: "Stop AI Worker"
    kind: "stop"
    device: "ai_worker"
    triggers:
      - "stop AI Worker"
      - "AI Worker stop"
    run:
      method: "run_command"
      command_key: "stop"

  - name: omy_leader_follower
    display_name: "OMY Bringup"
    kind: "recipe"
    device: "omy"
    triggers:
      - "start OMY leader mode"
      - "OMY leader follower"
      - "start OMY"
    run:
      method: "start_recipe"
      recipe_id: "omy_bringup"

  - name: omy_moveit
    display_name: "OMY MoveIt"
    kind: "recipe"
    device: "omy"
    triggers:
      - "start OMY MoveIt"
      - "run OMY MoveIt"
    run:
      method: "start_recipe"
      recipe_id: "omy_moveit"

  - name: omy_demo_motion
    display_name: "OMY Demo Motion"
    kind: "recipe"
    device: "omy"
    triggers:
      - "play OMY demo"
      - "OMY demo"
      - "make OMY move"
    run:
      method: "start_recipe"
      recipe_id: "omy_play_demo_bag"

  - name: omy_stop
    display_name: "Stop OMY"
    kind: "stop"
    device: "omy"
    triggers:
      - "stop OMY"
      - "OMY stop"
    run:
      method: "run_command"
      command_key: "stop"

  - name: omx_bringup_ai
    display_name: "OMX-AI Leader Follower Bringup"
    kind: "cli_command"
    device: "omx"
    triggers:
      - "start OMX AI"
      - "start OMX leader follower"
      - "bring up OMX AI"
    run:
      method: "run_command"
      command_key: "bringup_ai"

  - name: omx_bringup_f
    display_name: "OMX-F Bringup"
    kind: "recipe"
    device: "omx"
    triggers:
      - "start OMX"
      - "bring up OMX"
      - "start OMX follower"
    run:
      method: "start_recipe"
      recipe_id: "omx_bringup_f"

  - name: omx_moveit
    display_name: "OMX MoveIt"
    kind: "recipe"
    device: "omx"
    triggers:
      - "start OMX MoveIt"
      - "run OMX MoveIt"
    run:
      method: "start_recipe"
      recipe_id: "omx_moveit"

  - name: omx_play_demo_bag
    display_name: "Play OMX Demo Rosbag"
    kind: "recipe"
    device: "omx"
    triggers:
      - "play OMX demo"
      - "play OMX rosbag"
      - "run OMX demo motion"
    run:
      method: "start_recipe"
      recipe_id: "omx_play_demo_bag"

  - name: omx_stop
    display_name: "Stop OMX"
    kind: "stop"
    device: "omx"
    triggers:
      - "stop OMX"
      - "stop OMX processes"
    run:
      method: "run_command"
      command_key: "stop"

  - name: omx_push_box_custom
    display_name: "OMX Push Box Custom"
    kind: "manual_task"
    device: "omx"
    triggers:
      - "push the box"
      - "clear the box"
    run:
      method: "run_manual_task"
      task_name: "push_box_custom"

  - name: omx_hand_teleop
    display_name: "OMX Hand Teleop"
    kind: "teleop_mode"
    device: "omx"
    triggers:
      - "let me drive"
      - "start hand teleop"
      - "manual control"
    run:
      method: "start_hand_teleop"

  - name: stop_all
    display_name: "Stop All Robots"
    kind: "stop"
    device: "all"
    triggers:
      - "stop all"
      - "stop everything"
      - "emergency stop"
    run:
      method: "stop_all"
